name: flutter_family_controls
description: A Flutter plugin for iOS Screen Time API. Provides FamilyControls authorization, FamilyActivityPicker for app selection, and ManagedSettings for enabling/disabling app restrictions.
version: 0.0.3
homepage: https://github.com/kyam28/flutter_family_controls
repository: https://github.com/kyam28/flutter_family_controls
issue_tracker: https://github.com/kyam28/flutter_family_controls/issues

environment:
  sdk: ^3.9.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: FlutterFamilyControlsPlugin
